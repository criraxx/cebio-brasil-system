<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Projeto - CEBIO Brasil</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .project-header {
      background: linear-gradient(135deg, #1b7a3a 0%, #0d4620 100%);
      color: white;
      padding: 40px;
      border-radius: 8px;
      margin-bottom: 32px;
    }
    .project-header h1 {
      margin: 0 0 16px 0;
      font-size: 32px;
    }
    .project-header-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meta-label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      font-weight: 600;
    }
    .meta-value {
      font-size: 14px;
      font-weight: 600;
    }
    .tabs-container {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0e0e0;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #1b7a3a;
      border-bottom-color: #1b7a3a;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .section-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #1b7a3a;
      margin: 0 0 16px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid #e8f4fd;
    }
    .description-text {
      color: #666;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .authors-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .author-card {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .author-name {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .author-info {
      font-size: 12px;
      color: #666;
    }
    .files-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .file-item {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .file-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .file-icon {
      width: 40px;
      height: 40px;
      background: #e3f2fd;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .file-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .file-name {
      font-weight: 600;
      color: #333;
      font-size: 13px;
    }
    .file-meta {
      font-size: 11px;
      color: #999;
    }
    .btn-download {
      padding: 8px 16px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-download:hover {
      background: #1976d2;
    }
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-item {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .link-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .link-title {
      font-weight: 600;
      color: #333;
      font-size: 13px;
    }
    .link-url {
      font-size: 12px;
      color: #2196f3;
      word-break: break-all;
    }
    .btn-open {
      padding: 8px 16px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-open:hover {
      background: #388e3c;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-category {
      background: #e3f2fd;
      color: #1565c0;
    }
    .badge-level {
      background: #f3e5f5;
      color: #6a1b9a;
    }
    .badge-status {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .badge-status.pendente {
      background: #fff3cd;
      color: #856404;
    }
    .badge-status.rejeitado {
      background: #ffebee;
      color: #c62828;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1b7a3a;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="top-header">
    <div class="top-header-left">
      <div class="logo-if"><span class="r"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span></div>
      <span class="logo-x">x</span>
      <svg viewBox="0 0 40 40" width="28" height="28"><polygon points="20,2 35,10 35,26 20,34 5,26 5,10" fill="none" stroke="#00897b" stroke-width="1.8"/><circle cx="20" cy="14" r="2.5" fill="#00897b"/><circle cx="14" cy="22" r="2.5" fill="#00897b"/><circle cx="26" cy="22" r="2.5" fill="#00897b"/><line x1="20" y1="14" x2="14" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="20" y1="14" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="14" y1="22" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/></svg>
      <div class="brand-text"><h1>CEBIO Brasil</h1><p>Centro de Excelência em Bioinsumos</p></div>
    </div>
    <div class="top-header-center"></div>
    <div class="top-header-right"><span class="user-name" id="header-user-name">Carregando...</span><span class="user-badge-type" id="userBadge">User</span></div>
  </header>

  <!-- CONTEÚDO -->
  <div class="main-container">
    <a href="javascript:history.back()" class="back-link">← Voltar</a>

    <div id="projectContent">
      <p style="text-align: center; color: #999;">Carregando projeto...</p>
    </div>
  </div>

  <script src="utils/sanitize.js"></script>
  <script src="utils/xss-fixes.js"></script>
  <script src="api.js"></script>
  <script src="components/toast.js"></script>
  <script src="components/loading.js"></script>
  <script src="components/password-modal.js"></script>
  <script src="script.js"></script>
  <script>
    let projectId = null;
    let project = null;
    let categories = [];
    let levels = [];

    async function initPage() {
      try {
        // Obter ID do projeto da URL
        const params = new URLSearchParams(window.location.search);
        projectId = params.get('id');

        if (!projectId) {
          showError('ID do projeto não fornecido');
          return;
        }

        // Carregar dados do usuário
        const user = Session.user;
        document.getElementById('header-user-name').textContent = user.name || 'Usuário';
        document.getElementById('userBadge').textContent = user.role || 'User';

        // Carregar categorias e níveis (opcional, usar dados do projeto se não conseguir)
        try {
          categories = await api.get('/categories?active_only=false');
          levels = await api.get('/academic-levels?active_only=false');
        } catch (e) {
          categories = [];
          levels = [];
        }

        // Carregar projeto
        await loadProject();
      } catch (error) {
        showError('Erro ao carregar página: ' + error.message);
      }
    }

    async function loadProject() {
      showLoading();
      try {
        project = await Projects.get(projectId);
        renderProject();
      } catch (error) {
        showError('Erro ao carregar projeto: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    function renderProject() {
      const categoryName = categories.find(c => c.id === parseInt(project.category))?.name || project.category;
      const levelName = levels.find(l => l.id === parseInt(project.academic_level))?.name || project.academic_level;
      const statusLabels = {
        'rascunho': 'Rascunho',
        'em_submissao': 'Em Submissão',
        'em_revisao': 'Em Revisão',
        'aprovado': 'Aprovado',
        'rejeitado': 'Rejeitado'
      };

      const html = `
        <!-- HEADER DO PROJETO -->
        <div class="project-header">
          <h1>${project.title}</h1>
          <p style="margin: 0; opacity: 0.9; font-size: 14px;">${project.summary || 'Nenhuma descrição fornecida'}</p>
          <div class="project-header-meta">
            <div class="meta-item">
              <span class="meta-label">ID do Projeto</span>
              <span class="meta-value">#${project.id}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Categoria</span>
              <span class="meta-value"><span class="badge badge-category">${categoryName}</span></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Nível Acadêmico</span>
              <span class="meta-value"><span class="badge badge-level">${levelName}</span></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status</span>
              <span class="meta-value"><span class="badge badge-status ${project.status}">${statusLabels[project.status]}</span></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Criado em</span>
              <span class="meta-value">${fmtDate(project.created_at)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Atualizado em</span>
              <span class="meta-value">${fmtDate(project.updated_at)}</span>
            </div>
          </div>
          ${Session.user.role === 'admin' && project.status === 'em_revisao' ? `
          <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button class="btn btn-green" onclick="approveProjectDetail(${project.id}, '${project.title.replace(/'/g, "\\'")}')">✓ Aprovar Projeto</button>
            <button class="btn btn-danger" onclick="rejectProjectDetail(${project.id}, '${project.title.replace(/'/g, "\\'")}')">✗ Rejeitar Projeto</button>
          </div>
          ` : ''}
        </div>

        <!-- ABAS -->
        <div class="tabs-container">
          <button class="tab-btn active" onclick="switchTab('overview')">📋 Visão Geral</button>
          <button class="tab-btn" onclick="switchTab('authors')">👥 Autores</button>
          <button class="tab-btn" onclick="switchTab('files')">📎 Anexos</button>
          <button class="tab-btn" onclick="switchTab('links')">🔗 Links</button>
          <button class="tab-btn" onclick="switchTab('history')">📜 Histórico</button>
        </div>

        <!-- TAB: VISÃO GERAL -->
        <div id="overview" class="tab-content active">
          <div class="section-card">
            <h3 class="section-title">Informações Principais</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div>
                <label style="font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase;">Criado por</label>
                    <p style="margin: 8px 0 0 0; color: #333; font-size: 14px;">${project.owner?.name || 'Sem informação'}</p>
                <p style="margin: 4px 0 0 0; color: #999; font-size: 12px;">${project.owner?.email || 'Não disponível'}</p>
              </div>
              <div>
                <label style="font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase;">Público Alvo</label>
                <p style="margin: 8px 0 0 0; color: #333; font-size: 14px;">${project.target_audience || 'Sem informação'}</p>
              </div>
            </div>
          </div>

          <div class="section-card">
            <h3 class="section-title">Descrição Completa</h3>
            <div class="description-text">${project.summary || 'Nenhuma descrição fornecida'}</div>
          </div>

          ${project.start_date || project.end_date ? `
            <div class="section-card">
              <h3 class="section-title">Período</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                  <label style="font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase;">Data de Início</label>
                  <p style="margin: 8px 0 0 0; color: #333; font-size: 14px;">${project.start_date ? fmtDate(project.start_date) : 'Não especificada'}</p>
                </div>
                <div>
                  <label style="font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase;">Data de Término</label>
                  <p style="margin: 8px 0 0 0; color: #333; font-size: 14px;">${project.end_date ? fmtDate(project.end_date) : 'Não especificada'}</p>
                </div>
              </div>
            </div>
          ` : ''}
        </div>

        <!-- TAB: AUTORES -->
        <div id="authors" class="tab-content">
          <div class="section-card">
            <h3 class="section-title">Autores e Colaboradores</h3>
            ${project.authors && project.authors.length > 0 ? `
              <div class="authors-list">
                ${project.authors.map(author => `
                  <div class="author-card">
                    <div class="author-name">${author.name}</div>
                    ${author.cpf ? `<div class="author-info"><strong>CPF:</strong> ${author.cpf}</div>` : ''}
                    ${author.institution ? `<div class="author-info"><strong>Instituição:</strong> ${author.institution}</div>` : ''}
                    ${author.email ? `<div class="author-info"><strong>Email:</strong> ${author.email}</div>` : ''}
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="empty-state">
                <p>Nenhum autor adicionado.</p>
              </div>
            `}
          </div>
        </div>

        <!-- TAB: ANEXOS -->
        <div id="files" class="tab-content">
          <div class="section-card">
            <h3 class="section-title">Arquivos Anexados</h3>
            ${project.files && project.files.length > 0 ? `
              <div class="files-list">
                ${project.files.map(file => `
                  <div class="file-item">
                    <div class="file-info">
                      <div class="file-icon">📄</div>
                      <div class="file-details">
                        <div class="file-name">${file.filename}</div>
                        <div class="file-meta">${formatFileSize(file.file_size)} • ${fmtDate(file.uploaded_at)}</div>
                      </div>
                    </div>
                    <button class="btn-download" onclick="downloadFile(${file.id})">Download</button>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="empty-state">
                <p>Nenhum arquivo anexado.</p>
              </div>
            `}
          </div>
        </div>

        <!-- TAB: LINKS -->
        <div id="links" class="tab-content">
          <div class="section-card">
            <h3 class="section-title">Links Relacionados</h3>
            ${project.links && project.links.length > 0 ? `
              <div class="links-list">
                ${project.links.map(link => `
                  <div class="link-item">
                    <div class="link-info">
                      <div class="link-title">${link.title}</div>
                      <div class="link-url">${link.url}</div>
                    </div>
                    <button class="btn-open" onclick="window.open('${link.url}', '_blank')">Abrir</button>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="empty-state">
                <p>Nenhum link adicionado.</p>
              </div>
            `}
          </div>
        </div>

        <!-- TAB: HISTÓRICO -->
        <div id="history" class="tab-content">
          <div class="section-card">
            <h3 class="section-title">Histórico de Alterações</h3>
            ${project.versions && project.versions.length > 0 ? `
              <div style="display: flex; flex-direction: column; gap: 12px;">
                ${project.versions.map(version => `
                  <div style="background: #f9f9f9; border-left: 4px solid #1b7a3a; padding: 12px; border-radius: 4px;">
                    <div style="font-weight: 600; color: #333; font-size: 13px;">Versão ${version.version_number}</div>
                    <div style="font-size: 12px; color: #666; margin-top: 4px;">${version.description || 'Sem descrição'}</div>
                    <div style="font-size: 11px; color: #999; margin-top: 8px;">
                      ${version.author?.name || 'Desconhecido'} • ${fmtDate(version.created_at)}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="empty-state">
                <p>Nenhuma alteração registrada.</p>
              </div>
            `}
          </div>
        </div>
      `;

      document.getElementById('projectContent').innerHTML = html;
    }

    function switchTab(tabName) {
      // Ocultar todos os tabs
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      // Mostrar tab selecionado
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    async function downloadFile(fileId) {
      try {
        window.location.href = `/api/files/${fileId}`;
      } catch (error) {
        showError('Erro ao baixar arquivo: ' + error.message);
      }
    }

    async function approveProjectDetail(projectId, projectTitle) {
      if (!confirm(`Deseja aprovar o projeto "${projectTitle}"?`)) return;

      showLoading();
      try {
        const response = await http('PUT', `/projects/${projectId}`, { status: 'aprovado' });
        showSuccess('Projeto aprovado com sucesso!');
        setTimeout(() => {
          window.location.href = 'admin-projetos-avancado.html';
        }, 1500);
      } catch (error) {
        showError('Erro ao aprovar projeto: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    async function rejectProjectDetail(projectId, projectTitle) {
      const motivo = prompt('Digite o motivo da rejeição:');
      if (motivo === null) return;

      showLoading();
      try {
        const response = await http('PUT', `/projects/${projectId}`, { 
          status: 'rejeitado',
          review_comment: motivo
        });
        showSuccess('Projeto rejeitado com sucesso!');
        setTimeout(() => {
          window.location.href = 'admin-projetos-avancado.html';
        }, 1500);
      } catch (error) {
        showError('Erro ao rejeitar projeto: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
