<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Projetos - CEBIO Brasil</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .filters-section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-group label {
      font-weight: 600;
      color: #333;
      font-size: 13px;
    }
    .filter-group input,
    .filter-group select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .project-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s;
    }
    .project-card:hover {
      border-color: #1b7a3a;
      box-shadow: 0 4px 12px rgba(27, 122, 58, 0.1);
    }
    .project-title {
      font-size: 16px;
      font-weight: 600;
      color: #1b7a3a;
      margin: 0;
    }
    .project-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #666;
    }
    .meta-item {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-category {
      background: #e3f2fd;
      color: #1565c0;
    }
    .badge-level {
      background: #f3e5f5;
      color: #6a1b9a;
    }
    .badge-status {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .badge-status.pendente {
      background: #fff3cd;
      color: #856404;
    }
    .badge-status.rejeitado {
      background: #ffebee;
      color: #c62828;
    }
    .project-owner {
      font-size: 12px;
      color: #999;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    .project-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-action {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-view {
      background: #2196f3;
      color: white;
    }
    .btn-view:hover {
      background: #1976d2;
    }
    .btn-edit {
      background: #ff9800;
      color: white;
    }
    .btn-edit:hover {
      background: #f57c00;
    }
    .btn-delete {
      background: #f44336;
      color: white;
    }
    .btn-delete:hover {
      background: #da190b;
    }
    .btn-approve {
      background: #4caf50;
      color: white;
    }
    .btn-approve:hover {
      background: #388e3c;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }
    .pagination button {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .pagination button.active {
      background: #1b7a3a;
      color: white;
      border-color: #1b7a3a;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      font-size: 18px;
      font-weight: 600;
      color: #1b7a3a;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="top-header">
    <div class="top-header-left">
      <div class="logo-if"><span class="r"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span></div>
      <span class="logo-x">x</span>
      <svg viewBox="0 0 40 40" width="28" height="28"><polygon points="20,2 35,10 35,26 20,34 5,26 5,10" fill="none" stroke="#00897b" stroke-width="1.8"/><circle cx="20" cy="14" r="2.5" fill="#00897b"/><circle cx="14" cy="22" r="2.5" fill="#00897b"/><circle cx="26" cy="22" r="2.5" fill="#00897b"/><line x1="20" y1="14" x2="14" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="20" y1="14" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="14" y1="22" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/></svg>
      <div class="brand-text"><h1>CEBIO Brasil</h1><p>Centro de Excelência em Bioinsumos</p></div>
    </div>
    <div class="top-header-center"><div class="search-box"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none"/></svg><input type="text" id="globalSearch" placeholder="Buscar projetos..."></div></div>
    <div class="top-header-right"><span class="user-name" id="header-user-name">Carregando...</span><span class="user-badge-type badge-admin">Admin</span></div>
  </header>

  <!-- SUB-HEADER -->
  <div class="sub-header">
    <div class="sub-header-left">
      <nav class="nav-tabs">
        <a href="admin-dashboard.html" class="nav-tab">Dashboard</a>
        <a href="admin-projetos-avancado.html" class="nav-tab active">Projetos</a>
        <a href="admin-usuarios-avancado.html" class="nav-tab">Usuários</a>
        <a href="admin-categorias.html" class="nav-tab">Categorias</a>
        <a href="admin-acoes.html" class="nav-tab">Ações Admin</a>
      </nav>
    </div>
    <div class="sub-header-right">
      <div class="logout-btn" data-href="login.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="main-container">
    <h2 style="color: #1b7a3a; margin-bottom: 24px;">Gerenciar Projetos</h2>

    <!-- FILTROS -->
    <div class="filters-section">
      <div class="filter-group">
        <label>Buscar por Nome/ID</label>
        <input type="text" id="searchFilter" placeholder="Digite para filtrar...">
      </div>
      <div class="filter-group">
        <label>Categoria</label>
        <select id="categoryFilter">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Nível Acadêmico</label>
        <select id="levelFilter">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="statusFilter">
          <option value="">Todos</option>
          <option value="rascunho">Rascunho</option>
          <option value="em_submissao">Em Submissão</option>
          <option value="em_revisao">Em Revisão</option>
          <option value="aprovado">Aprovado</option>
          <option value="rejeitado">Rejeitado</option>
        </select>
      </div>
      <div class="filter-group">
        <label>&nbsp;</label>
        <button class="btn btn-green" onclick="applyFilters()">Filtrar</button>
      </div>
    </div>

    <!-- GRID DE PROJETOS -->
    <div id="projectsGrid" class="projects-grid">
      <div class="empty-state">
        <p>Carregando projetos...</p>
      </div>
    </div>

    <!-- PAGINAÇÃO -->
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- MODAL: VISUALIZAR PROJETO -->
  <div id="projectModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalTitle">Detalhes do Projeto</span>
        <button class="modal-close" onclick="closeProjectModal()">×</button>
      </div>
      <div id="projectDetails"></div>
    </div>
  </div>

  <script src="utils/sanitize.js"></script>
  <script src="utils/xss-fixes.js"></script>
  <script src="api.js"></script>
  <script src="components/toast.js"></script>
  <script src="components/loading.js"></script>
  <script src="components/password-modal.js"></script>
  <script src="script.js"></script>
  <script>
    let allProjects = [];
    let filteredProjects = [];
    let categories = [];
    let levels = [];
    let currentPage = 1;
    const itemsPerPage = 12;

    async function initPage() {
      if (!Session.requireAuth('admin')) return;
      
      try {
        const user = Session.user;
        document.getElementById('header-user-name').textContent = user.name || 'Admin';
        
        // Carregar categorias e níveis para os filtros
        await loadFilterOptions();
        await loadProjects();
      } catch (error) {
        showError('Erro ao carregar página: ' + error.message);
      }
    }

    async function loadFilterOptions() {
      try {
        categories = await api.get('/categories?active_only=false');
        levels = await api.get('/academic-levels?active_only=false');

        // Preencher select de categorias
        const categorySelect = document.getElementById('categoryFilter');
        categorySelect.innerHTML = '<option value="">Todas</option>' + 
          categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');

        // Preencher select de níveis
        const levelSelect = document.getElementById('levelFilter');
        levelSelect.innerHTML = '<option value="">Todos</option>' + 
          levels.map(level => `<option value="${level.id}">${level.name}</option>`).join('');
      } catch (error) {
        console.error('Erro ao carregar opções de filtro:', error);
      }
    }

    async function loadProjects() {
      showLoading();
      try {
        console.log('Carregando projetos...');
        const response = await Projects.list({ per_page: 100 });
        console.log('Resposta da API:', response);
        allProjects = response.items || [];
        console.log('Projetos carregados:', allProjects.length);
        // Mostrar todos os projetos por padrão
        filteredProjects = [...allProjects];
        // Limpar filtros
        document.getElementById('statusFilter').value = '';
        currentPage = 1;
        renderProjects();
      } catch (error) {
        showError('Erro ao carregar projetos: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    function applyFilters() {
      const search = document.getElementById('searchFilter').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const level = document.getElementById('levelFilter').value;
      const status = document.getElementById('statusFilter').value;

      filteredProjects = allProjects.filter(project => {
        const matchSearch = !search || project.title.toLowerCase().includes(search) || project.id.toString().includes(search);
        const matchCategory = !category || project.category === category;
        const matchLevel = !level || project.academic_level === level;
        const matchStatus = !status || project.status === status;
        return matchSearch && matchCategory && matchLevel && matchStatus;
      });

      currentPage = 1;
      renderProjects();
    }

    function renderProjects() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageProjects = filteredProjects.slice(start, end);

      const grid = document.getElementById('projectsGrid');
      if (pageProjects.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>Nenhum projeto encontrado.</p></div>';
        renderPagination();
        return;
      }

      grid.innerHTML = pageProjects.map(project => {
        const categoryName = categories.find(c => c.id === parseInt(project.category))?.name || project.category;
        const levelName = levels.find(l => l.id === parseInt(project.academic_level))?.name || project.academic_level;
        const statusLabels = {
          'rascunho': 'Rascunho',
          'em_submissao': 'Em Submissão',
          'em_revisao': 'Em Revisão',
          'aprovado': 'Aprovado',
          'rejeitado': 'Rejeitado'
        };

        return `
          <div class="project-card">
            <h3 class="project-title">${project.title}</h3>
            <div class="project-meta">
              <span class="meta-item">ID: ${project.id}</span>
              <span class="badge badge-category">${categoryName}</span>
              <span class="badge badge-level">${levelName}</span>
              <span class="badge badge-status ${project.status}">${statusLabels[project.status] || project.status}</span>
            </div>
            <p style="margin: 0; font-size: 13px; color: #666; line-height: 1.4;">${project.summary || 'Nenhuma descrição fornecida'}</p>
            <div class="project-owner">
              <strong>Criado por:</strong> ${project.owner?.name || 'Sem informação'}<br>
              <strong>Data:</strong> ${fmtDate(project.created_at)}
            </div>
            <div class="project-actions">
              <button class="btn-action btn-view" onclick="viewProject(${project.id})">Visualizar</button>
              ${project.status === 'em_revisao' ? `<button class="btn-action btn-approve" onclick="approveProject(${project.id}, '${project.title}')">Aprovar</button>` : ''}
              <button class="btn-action btn-delete" onclick="deleteProject(${project.id})">Deletar</button>
            </div>
          </div>
        `;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      if (currentPage > 1) {
        html += `<button onclick="currentPage--; renderProjects()">← Anterior</button>`;
      }

      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="currentPage=${i}; renderProjects()">${i}</button>`;
      }

      if (currentPage < totalPages) {
        html += `<button onclick="currentPage++; renderProjects()">Próxima →</button>`;
      }

      pagination.innerHTML = html;
    }

    async function viewProject(projectId) {
      try {
        const project = await Projects.get(projectId);
        document.getElementById('modalTitle').textContent = `Projeto #${project.id}: ${project.title}`;
        
        const categoryName = categories.find(c => c.id === parseInt(project.category))?.name || project.category;
        const levelName = levels.find(l => l.id === parseInt(project.academic_level))?.name || project.academic_level;
        const statusLabels = {
          'rascunho': 'Rascunho',
          'em_submissao': 'Em Submissão',
          'em_revisao': 'Em Revisão',
          'aprovado': 'Aprovado',
          'rejeitado': 'Rejeitado'
        };

        const details = document.getElementById('projectDetails');
        details.innerHTML = `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; background: #f9f9f9; padding: 16px; border-radius: 6px;">
            <div>
              <span style="font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;">Categoria</span>
              <div style="font-size: 14px; color: #333;">${categoryName}</div>
            </div>
            <div>
              <span style="font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;">Nível Acadêmico</span>
              <div style="font-size: 14px; color: #333;">${levelName}</div>
            </div>
            <div>
              <span style="font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;">Status</span>
              <div style="font-size: 14px; color: #333;"><span class="badge badge-status ${project.status}">${statusLabels[project.status]}</span></div>
            </div>
            <div>
              <span style="font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;">Criado em</span>
              <div style="font-size: 14px; color: #333;">${fmtDate(project.created_at)}</div>
            </div>
          </div>

          <div style="margin-bottom: 20px;">
            <h4 style="margin: 0 0 8px 0; color: #333;">Descrição</h4>
            <p style="margin: 0; color: #666; font-size: 13px; line-height: 1.6;">${project.summary || 'Sem descrição'}</p>
          </div>

          <div style="margin-bottom: 20px;">
            <h4 style="margin: 0 0 8px 0; color: #333;">Criado por</h4>
            <p style="margin: 0; color: #666; font-size: 13px;">${project.owner?.name || 'Desconhecido'} (${project.owner?.email || 'N/A'})</p>
          </div>

          ${project.authors && project.authors.length > 0 ? `
            <div style="margin-bottom: 20px;">
              <h4 style="margin: 0 0 8px 0; color: #333;">Autores</h4>
              <ul style="margin: 0; padding-left: 20px; color: #666; font-size: 13px;">
                ${project.authors.map(a => `<li>${a.name}${a.cpf ? ` (${a.cpf})` : ''}</li>`).join('')}
              </ul>
            </div>
          ` : ''}

          <div style="padding-top: 20px; border-top: 1px solid #ddd;">
            <button class="btn btn-dark" onclick="closeProjectModal()" style="width: 100%;">Fechar</button>
          </div>
        `;

        document.getElementById('projectModal').classList.add('active');
      } catch (error) {
        showError('Erro ao carregar projeto: ' + error.message);
      }
    }

    function closeProjectModal() {
      document.getElementById('projectModal').classList.remove('active');
    }

    async function approveProject(projectId, projectTitle) {
      if (!confirm(`Deseja aprovar o projeto "${projectTitle}"?`)) return;

      showLoading();
      try {
        // Chamar endpoint de aprovação
        const response = await http('PUT', `/projects/${projectId}`, { status: 'aprovado' });
        showSuccess('Projeto aprovado com sucesso!');
        closeProjectModal();
        await loadProjects();
      } catch (error) {
        showError('Erro ao aprovar projeto: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    async function deleteProject(projectId) {
      if (!confirm('Tem certeza que deseja deletar este projeto?')) return;

      showLoading();
      try {
        await Projects.delete(projectId);
        showSuccess('Projeto deletado com sucesso!');
        await loadProjects();
      } catch (error) {
        showError('Erro ao deletar projeto: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    // Busca em tempo real
    document.getElementById('globalSearch').addEventListener('input', applyFilters);
    document.getElementById('searchFilter').addEventListener('input', applyFilters);

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
