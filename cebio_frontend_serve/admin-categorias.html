<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Categorias e Níveis - CEBIO Brasil</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .tabs-container {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }
    .tab-btn.active {
      color: #1b7a3a;
      border-bottom-color: #1b7a3a;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .form-section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1b7a3a;
      box-shadow: 0 0 0 3px rgba(27, 122, 58, 0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .color-picker-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .color-picker-wrap input[type="color"] {
      width: 60px;
      height: 40px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    .color-preview {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .item-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .item-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }
    .item-card-title {
      font-weight: 600;
      color: #333;
      font-size: 15px;
    }
    .item-card-actions {
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-sm-edit {
      background: #2196f3;
      color: white;
    }
    .btn-sm-edit:hover {
      background: #1976d2;
    }
    .btn-sm-delete {
      background: #f44336;
      color: white;
    }
    .btn-sm-delete:hover {
      background: #da190b;
    }
    .item-card-desc {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
    }
    .item-card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #999;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-active {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status-inactive {
      background: #ffebee;
      color: #c62828;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      font-size: 18px;
      font-weight: 600;
      color: #1b7a3a;
      margin-bottom: 24px;
    }
    .modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="top-header">
    <div class="top-header-left">
      <div class="logo-if"><span class="r"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="g"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span><span class="dg"></span></div>
      <span class="logo-x">x</span>
      <svg viewBox="0 0 40 40" width="28" height="28"><polygon points="20,2 35,10 35,26 20,34 5,26 5,10" fill="none" stroke="#00897b" stroke-width="1.8"/><circle cx="20" cy="14" r="2.5" fill="#00897b"/><circle cx="14" cy="22" r="2.5" fill="#00897b"/><circle cx="26" cy="22" r="2.5" fill="#00897b"/><line x1="20" y1="14" x2="14" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="20" y1="14" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/><line x1="14" y1="22" x2="26" y2="22" stroke="#00897b" stroke-width="1.2"/></svg>
      <div class="brand-text"><h1>CEBIO Brasil</h1><p>Centro de Excelência em Bioinsumos</p></div>
    </div>
    <div class="top-header-center"><div class="search-box"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none"/></svg><input type="text" placeholder="Buscar..."></div></div>
    <div class="top-header-right"><span class="user-name" id="header-user-name">Carregando...</span><span class="user-badge-type badge-admin">Admin</span></div>
  </header>

  <!-- SUB-HEADER -->
  <div class="sub-header">
    <div class="sub-header-left">
      <nav class="nav-tabs">
        <a href="admin-dashboard.html" class="nav-tab">Dashboard</a>
        <a href="admin-projetos.html" class="nav-tab">Projetos</a>
        <a href="admin-usuarios.html" class="nav-tab">Usuários</a>
        <a href="admin-categorias.html" class="nav-tab active">Categorias</a>
        <a href="admin-acoes.html" class="nav-tab">Ações Admin</a>
      </nav>
    </div>
    <div class="sub-header-right">
      <div class="logout-btn" data-href="login.html"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="main-container">
    <div class="tabs-container">
      <button class="tab-btn active" onclick="switchTab('categories')">📁 Categorias</button>
      <button class="tab-btn" onclick="switchTab('levels')">🎓 Níveis Acadêmicos</button>
    </div>

    <!-- TAB: CATEGORIAS -->
    <div id="categories" class="tab-content active">
      <div class="form-section">
        <h3 style="margin-top: 0; color: #1b7a3a;">Adicionar Nova Categoria</h3>
        <form id="categoryForm">
          <div class="form-row">
            <div class="form-group">
              <label>Nome da Categoria</label>
              <input type="text" name="name" placeholder="Ex: Projetos de Pesquisa" required>
            </div>
            <div class="form-group">
              <label>Slug (URL-friendly)</label>
              <input type="text" name="slug" placeholder="Ex: projetos-pesquisa" required>
            </div>
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea name="description" placeholder="Descrição da categoria..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Cor</label>
              <div class="color-picker-wrap">
                <input type="color" name="color" value="#1a9a4a" id="categoryColor">
                <div class="color-preview" id="colorPreview" style="background: #1a9a4a;"></div>
              </div>
            </div>
            <div class="form-group">
              <label>Ícone (opcional)</label>
              <input type="text" name="icon" placeholder="Ex: folder, book, etc">
            </div>
          </div>
          <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-green" style="flex: 1;">Criar Categoria</button>
            <button type="reset" class="btn btn-dark" style="flex: 1;">Limpar</button>
          </div>
        </form>
      </div>

      <h3 style="color: #1b7a3a; margin-top: 32px;">Categorias Existentes</h3>
      <div id="categoriesList" class="items-grid">
        <p style="grid-column: 1/-1; text-align: center; color: #999;">Carregando categorias...</p>
      </div>
    </div>

    <!-- TAB: NÍVEIS ACADÊMICOS -->
    <div id="levels" class="tab-content">
      <div class="form-section">
        <h3 style="margin-top: 0; color: #1b7a3a;">Adicionar Novo Nível Acadêmico</h3>
        <form id="levelForm">
          <div class="form-row">
            <div class="form-group">
              <label>Nome do Nível</label>
              <input type="text" name="name" placeholder="Ex: Graduação" required>
            </div>
            <div class="form-group">
              <label>Slug (URL-friendly)</label>
              <input type="text" name="slug" placeholder="Ex: graduacao" required>
            </div>
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea name="description" placeholder="Descrição do nível acadêmico..."></textarea>
          </div>
          <div class="form-group">
            <label>Ordem (para exibição)</label>
            <input type="number" name="order" value="0" min="0">
          </div>
          <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-green" style="flex: 1;">Criar Nível</button>
            <button type="reset" class="btn btn-dark" style="flex: 1;">Limpar</button>
          </div>
        </form>
      </div>

      <h3 style="color: #1b7a3a; margin-top: 32px;">Níveis Acadêmicos Existentes</h3>
      <div id="levelsList" class="items-grid">
        <p style="grid-column: 1/-1; text-align: center; color: #999;">Carregando níveis...</p>
      </div>
    </div>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header" id="modalTitle">Editar Categoria</div>
      <form id="editForm">
        <input type="hidden" name="id">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>Slug</label>
          <input type="text" name="slug" required>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea name="description"></textarea>
        </div>
        <div id="colorGroup" class="form-group" style="display: none;">
          <label>Cor</label>
          <div class="color-picker-wrap">
            <input type="color" name="color">
            <div class="color-preview" id="editColorPreview"></div>
          </div>
        </div>
        <div id="iconGroup" class="form-group" style="display: none;">
          <label>Ícone</label>
          <input type="text" name="icon">
        </div>
        <div id="orderGroup" class="form-group" style="display: none;">
          <label>Ordem</label>
          <input type="number" name="order" min="0">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-dark" onclick="closeEditModal()">Cancelar</button>
          <button type="submit" class="btn btn-green">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script src="utils/sanitize.js"></script>
  <script src="utils/xss-fixes.js"></script>
  <script src="api.js"></script>
  <script src="components/toast.js"></script>
  <script src="components/loading.js"></script>
  <script src="components/password-modal.js"></script>
  <script src="script.js"></script>
  <script>
    let currentEditType = 'category';
    let categories = [];
    let levels = [];

    async function initPage() {
      if (!Session.requireAuth('admin')) return;
      
      try {
        // Carregar dados do usuário
        const user = Session.user;
        document.getElementById('header-user-name').textContent = user.name || 'Admin';

        // Carregar categorias e níveis
        await loadCategories();
        await loadLevels();
      } catch (error) {
        showError('Erro ao carregar página: ' + error.message);
      }
    }

    function switchTab(tab) {
      // Ocultar todos os tabs
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      // Mostrar tab selecionado
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function loadCategories() {
      try {
        categories = await api.get('/categories?active_only=false');
        renderCategories();
      } catch (error) {
        showError('Erro ao carregar categorias: ' + error.message);
      }
    }

    async function loadLevels() {
      try {
        levels = await api.get('/academic-levels?active_only=false');
        renderLevels();
      } catch (error) {
        showError('Erro ao carregar níveis: ' + error.message);
      }
    }

    function renderCategories() {
      const container = document.getElementById('categoriesList');
      if (categories.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Nenhuma categoria criada ainda.</p>';
        return;
      }

      container.innerHTML = categories.map(cat => `
        <div class="item-card">
          <div class="item-card-header">
            <div>
              <div class="item-card-title">${cat.name}</div>
              <div class="item-card-desc">${cat.description || 'Sem descrição'}</div>
            </div>
            <div class="item-card-actions">
              <button class="btn-sm btn-sm-edit" onclick="editCategory(${cat.id})">Editar</button>
              <button class="btn-sm btn-sm-delete" onclick="deleteCategory(${cat.id})">Deletar</button>
            </div>
          </div>
          <div class="item-card-meta">
            <span style="background: ${cat.color || '#1a9a4a'}; color: white; padding: 4px 8px; border-radius: 4px;">Cor: ${cat.color || '#1a9a4a'}</span>
            <span class="status-badge ${cat.is_active ? 'status-active' : 'status-inactive'}">
              ${cat.is_active ? '✓ Ativo' : '✗ Inativo'}
            </span>
          </div>
        </div>
      `).join('');
    }

    function renderLevels() {
      const container = document.getElementById('levelsList');
      if (levels.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Nenhum nível criado ainda.</p>';
        return;
      }

      container.innerHTML = levels.map(level => `
        <div class="item-card">
          <div class="item-card-header">
            <div>
              <div class="item-card-title">${level.name}</div>
              <div class="item-card-desc">${level.description || 'Sem descrição'}</div>
            </div>
            <div class="item-card-actions">
              <button class="btn-sm btn-sm-edit" onclick="editLevel(${level.id})">Editar</button>
              <button class="btn-sm btn-sm-delete" onclick="deleteLevel(${level.id})">Deletar</button>
            </div>
          </div>
          <div class="item-card-meta">
            <span>Ordem: ${level.order}</span>
            <span class="status-badge ${level.is_active ? 'status-active' : 'status-inactive'}">
              ${level.is_active ? '✓ Ativo' : '✗ Inativo'}
            </span>
          </div>
        </div>
      `).join('');
    }

    // Formulário de Categoria
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      showLoading();
      try {
        await api.post('/categories', data);
        showSuccess('Categoria criada com sucesso!');
        e.target.reset();
        await loadCategories();
      } catch (error) {
        showError('Erro ao criar categoria: ' + error.message);
      } finally {
        hideLoading();
      }
    });

    // Formulário de Nível
    document.getElementById('levelForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      data.order = parseInt(data.order);

      showLoading();
      try {
        await api.post('/academic-levels', data);
        showSuccess('Nível acadêmico criado com sucesso!');
        e.target.reset();
        await loadLevels();
      } catch (error) {
        showError('Erro ao criar nível: ' + error.message);
      } finally {
        hideLoading();
      }
    });

    function editCategory(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat) return;

      currentEditType = 'category';
      document.getElementById('modalTitle').textContent = 'Editar Categoria';
      document.getElementById('colorGroup').style.display = 'block';
      document.getElementById('iconGroup').style.display = 'block';
      document.getElementById('orderGroup').style.display = 'none';

      const form = document.getElementById('editForm');
      form.id.value = id;
      form.name.value = cat.name;
      form.slug.value = cat.slug;
      form.description.value = cat.description || '';
      form.color.value = cat.color;
      form.icon.value = cat.icon || '';
      document.getElementById('editColorPreview').style.background = cat.color;

      document.getElementById('editModal').classList.add('active');
    }

    function editLevel(id) {
      const level = levels.find(l => l.id === id);
      if (!level) return;

      currentEditType = 'level';
      document.getElementById('modalTitle').textContent = 'Editar Nível Acadêmico';
      document.getElementById('colorGroup').style.display = 'none';
      document.getElementById('iconGroup').style.display = 'none';
      document.getElementById('orderGroup').style.display = 'block';

      const form = document.getElementById('editForm');
      form.id.value = id;
      form.name.value = level.name;
      form.slug.value = level.slug;
      form.description.value = level.description || '';
      form.order.value = level.order;

      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const id = formData.get('id');
      const data = Object.fromEntries(formData);
      delete data.id;

      showLoading();
      try {
        const endpoint = currentEditType === 'category' ? `/categories/${id}` : `/academic-levels/${id}`;
        await api.put(endpoint, data);
        showSuccess('Alterações salvas com sucesso!');
        closeEditModal();
        if (currentEditType === 'category') {
          await loadCategories();
        } else {
          await loadLevels();
        }
      } catch (error) {
        showError('Erro ao salvar: ' + error.message);
      } finally {
        hideLoading();
      }
    });

    async function deleteCategory(id) {
      if (!confirm('Tem certeza que deseja deletar esta categoria?')) return;

      showLoading();
      try {
        await api.delete(`/categories/${id}`);
        showSuccess('Categoria deletada com sucesso!');
        await loadCategories();
      } catch (error) {
        showError('Erro ao deletar: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    async function deleteLevel(id) {
      if (!confirm('Tem certeza que deseja deletar este nível?')) return;

      showLoading();
      try {
        await api.delete(`/academic-levels/${id}`);
        showSuccess('Nível deletado com sucesso!');
        await loadLevels();
      } catch (error) {
        showError('Erro ao deletar: ' + error.message);
      } finally {
        hideLoading();
      }
    }

    // Atualizar preview de cor
    document.getElementById('categoryColor').addEventListener('change', (e) => {
      document.getElementById('colorPreview').style.background = e.target.value;
    });

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
